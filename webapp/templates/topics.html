{% extends "base.html" %}
{% block title %}Rate Topics{% endblock %}

{% block content %}
<section class="card">
    <h2>How much do you care about each issue?</h2>
    <p>Rate each political topic on a scale of 1 (not important) to 10 (very important).</p>

    <form method="POST" action="{{ url_for('main.topics') }}">
        <div class="topics-grid">
            {% for topic in topics %}
            <div class="topic-row">
                <label for="{{ topic.key }}">{{ topic.name }}</label>
                <div class="slider-group">
                    <input type="range" id="{{ topic.key }}" name="{{ topic.key }}"
                           min="1" max="10" value="{{ topic.default }}"
                           oninput="document.getElementById('val_{{ topic.key }}').textContent = this.value">
                    <span class="slider-value" id="val_{{ topic.key }}">{{ topic.default }}</span>
                </div>
            </div>
            {% endfor %}
        </div>
        <button type="submit" class="btn-primary">Continue to Comparison</button>
    </form>
</section>
{% endblock %}
